name: Codex Android Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - "codex-build-*"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: simple-live-app
            package_dir: simple_live_app
            key_alias: simple_live_app
          - name: simple-live-tv-app
            package_dir: simple_live_tv_app
            key_alias: simple_live_tv_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          channel: stable
          cache: true

      - name: Create temporary release key
        working-directory: ${{ matrix.package_dir }}/android
        run: |
          keytool -genkeypair \
            -v \
            -storetype JKS \
            -keystore codex-release-key.jks \
            -storepass codex-release-pass \
            -keypass codex-release-pass \
            -alias "${{ matrix.key_alias }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Codex Build, OU=Codex, O=Local, L=Local, S=Local, C=US"

          {
            echo "storeFile=codex-release-key.jks"
            echo "storePassword=codex-release-pass"
            echo "keyPassword=codex-release-pass"
            echo "keyAlias=${{ matrix.key_alias }}"
          } > key.properties

      - name: Restore packages
        working-directory: ${{ matrix.package_dir }}
        run: flutter pub get

      - name: Build release APKs
        working-directory: ${{ matrix.package_dir }}
        run: |
          set +e
          flutter build apk --release --split-per-abi 2>&1 | tee build.log
          status=${PIPESTATUS[0]}

          if [ "$status" -ne 0 ]; then
            tail -n 120 build.log > build-tail.log
            {
              echo "### ${{ matrix.name }} build log tail"
              echo '```text'
              cat build-tail.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            message=$(python3 -c 'from pathlib import Path; text = Path("build-tail.log").read_text(errors="replace")[-7000:]; print(text.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A"))')
            echo "::error title=Flutter build failed::$message"
            exit "$status"
          fi

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-build-logs
          path: ${{ matrix.package_dir }}/build*.log
          if-no-files-found: ignore

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-release-apks
          path: ${{ matrix.package_dir }}/build/app/outputs/flutter-apk/*-release.apk
          if-no-files-found: error
