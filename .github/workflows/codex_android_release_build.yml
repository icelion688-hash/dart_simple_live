name: Codex Release Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - "codex-build-*"
      - "codex-release-*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: simple-live-app
            package_dir: simple_live_app
            key_alias: simple_live_app
          - name: simple-live-tv-app
            package_dir: simple_live_tv_app
            key_alias: simple_live_tv_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          channel: stable
          cache: true

      - name: Create temporary release key
        working-directory: ${{ matrix.package_dir }}/android
        run: |
          keytool -genkeypair \
            -v \
            -storetype JKS \
            -keystore app/codex-release-key.jks \
            -storepass codex-release-pass \
            -keypass codex-release-pass \
            -alias "${{ matrix.key_alias }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Codex Build, OU=Codex, O=Local, L=Local, S=Local, C=US"

          {
            echo "storeFile=codex-release-key.jks"
            echo "storePassword=codex-release-pass"
            echo "keyPassword=codex-release-pass"
            echo "keyAlias=${{ matrix.key_alias }}"
          } > key.properties

      - name: Restore packages
        working-directory: ${{ matrix.package_dir }}
        run: flutter pub get

      - name: Build release APKs
        working-directory: ${{ matrix.package_dir }}
        run: |
          set +e
          flutter build apk --release --split-per-abi 2>&1 | tee build.log
          status=${PIPESTATUS[0]}

          if [ "$status" -ne 0 ]; then
            tail -n 120 build.log > build-tail.log
            {
              echo "### ${{ matrix.name }} build log tail"
              echo '```text'
              cat build-tail.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            message=$(python3 -c 'from pathlib import Path; text = Path("build-tail.log").read_text(errors="replace")[-7000:]; print(text.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A"))')
            echo "::error title=Flutter build failed::$message"
            exit "$status"
          fi

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-build-logs
          path: ${{ matrix.package_dir }}/build*.log
          if-no-files-found: ignore

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-release-apks
          path: ${{ matrix.package_dir }}/build/app/outputs/flutter-apk/*-release.apk
          if-no-files-found: error

  build-windows:
    name: Build simple-live-app Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Restore packages
        working-directory: simple_live_app
        run: flutter pub get

      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor

      - name: Build Windows packages
        working-directory: simple_live_app
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $env:CL = "/D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS $env:CL"
          flutter_distributor package --platform windows --targets msix,zip --skip-clean *>&1 | Tee-Object -FilePath build-windows.log
          $status = $LASTEXITCODE

          if ($status -ne 0) {
            Get-Content -Path build-windows.log -Tail 160 | Set-Content -Path build-windows-tail.log
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### simple-live-app Windows build log tail"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```text'
            Get-Content -Path build-windows-tail.log | Add-Content -Path $env:GITHUB_STEP_SUMMARY
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```'

            $message = (Get-Content -Path build-windows-tail.log -Raw).
              Replace('%', '%25').
              Replace("`r", '%0D').
              Replace("`n", '%0A')
            Write-Output "::error title=Windows build failed::$message"
            exit $status
          }

      - name: Upload Windows build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-app-windows-build-logs
          path: simple_live_app/build-windows*.log
          if-no-files-found: ignore

      - name: Upload Windows packages
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-app-windows-packages
          path: |
            simple_live_app/build/dist/**/*.msix
            simple_live_app/build/dist/**/*.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/codex-release-')
    needs:
      - build
      - build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release metadata
        id: release
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF}" = "refs/heads/master" ]; then
            short_sha="${GITHUB_SHA::7}"
            timestamp="$(date -u +'%Y%m%d-%H%M')"
            release_tag="codex-auto-${timestamp}-${short_sha}"
            release_name="Codex Auto Release ${timestamp} ${short_sha}"
          else
            release_tag="${GITHUB_REF_NAME}"
            release_name="Codex Release ${GITHUB_REF_NAME}"
          fi

          {
            echo "tag=${release_tag}"
            echo "name=${release_name}"
          } >> "$GITHUB_OUTPUT"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          set -euo pipefail
          mkdir -p release-files

          cp artifacts/simple-live-app-release-apks/app-arm64-v8a-release.apk release-files/simple-live-app-arm64-v8a-release.apk
          cp artifacts/simple-live-app-release-apks/app-armeabi-v7a-release.apk release-files/simple-live-app-armeabi-v7a-release.apk
          cp artifacts/simple-live-app-release-apks/app-x86_64-release.apk release-files/simple-live-app-x86_64-release.apk

          cp artifacts/simple-live-tv-app-release-apks/app-arm64-v8a-release.apk release-files/simple-live-tv-app-arm64-v8a-release.apk
          cp artifacts/simple-live-tv-app-release-apks/app-armeabi-v7a-release.apk release-files/simple-live-tv-app-armeabi-v7a-release.apk
          cp artifacts/simple-live-tv-app-release-apks/app-x86_64-release.apk release-files/simple-live-tv-app-x86_64-release.apk

          find artifacts/simple-live-app-windows-packages -type f \( -name '*.msix' -o -name '*.zip' \) -print0 |
            while IFS= read -r -d '' file; do
              cp "$file" "release-files/simple-live-app-windows-$(basename "$file")"
            done

          find release-files -type f -maxdepth 1 -print | sort

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release.outputs.name }}
          body: |
            Codex-built release packages.

            Android APKs are signed with a temporary workflow-generated release key.
            Windows packages are produced from simple_live_app using the repository's flutter_distributor configuration.
          files: release-files/*
